name: SAP BAS Keep Alive
on:
  schedule:
    - cron: '0 * * * *'   # 每小时执行一次
  workflow_dispatch:

concurrency:
  group: bas-keepalive
  cancel-in-progress: false

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Login to BAS
        env:
          BAS_URL: ${{ secrets.BAS_URL }}
          BTP_USER: ${{ secrets.BTP_USER }}
          BTP_PASSWORD: ${{ secrets.BTP_PASSWORD }}
          BAS_SPACE_NAME: ${{ secrets.BAS_SPACE_NAME }}
        run: node scripts/bas-login.js

      - name: Keep repo active (prevent GitHub disabling workflow)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "Last run: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > .last-run
          git add .last-run
          git diff --staged --quiet || git commit -m "chore: keepalive $(date -u '+%Y-%m-%d %H:%M')"
          git pull --rebase origin ${{ github.ref_name }}
          git push

  cleanup:
    runs-on: ubuntu-latest
    needs: keepalive
    timeout-minutes: 60
    permissions:
      actions: write
      contents: read
    steps:
      - name: Delete completed workflow runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run list --repo ${{ github.repository }} --workflow "SAP BAS Keep Alive" --limit 1000 --json databaseId,status \
            | jq -r '.[] | select(.status == "completed") | .databaseId' \
            | while read -r id; do
                echo "Deleting run $id"
                gh run delete "$id" --repo ${{ github.repository }} || true
                sleep 0.3
              done
